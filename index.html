<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ping Pong Queue PRO</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    input, select, button { padding:10px; margin:5px; border-radius:8px; border:none; }
    button { background:#22c55e; color:white; cursor:pointer; }
    .danger { background:#ef4444; }
    .container { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-top:20px; }
    .card { background:#1e293b; padding:15px; border-radius:12px; }
    li { margin:5px 0; }
  </style>
</head>
<body>

<h1>🏓 Ping Pong Queue PRO</h1>

<input id="playerName" placeholder="Nombre jugador">
<button onclick="addPlayer()">Agregar</button>

<select id="mode">
  <option value="2">Individual</option>
  <option value="4">Dobles</option>
</select>

<button onclick="startGame()">Iniciar</button>
<button onclick="finishGame()">Finalizar (elige ganador)</button>

<div class="container">
  <div class="card">
    <h2>🎮 Jugando</h2>
    <ul id="playingList"></ul>
  </div>

  <div class="card">
    <h2>⏭ Siguiente</h2>
    <ul id="nextList"></ul>
  </div>

  <div class="card">
    <h2>📋 Cola</h2>
    <ul id="queueList"></ul>
  </div>
</div>

<script>
let queue = [];
let playing = [];

function save(){
  localStorage.setItem('queue', JSON.stringify(queue));
  localStorage.setItem('playing', JSON.stringify(playing));
}

function load(){
  queue = JSON.parse(localStorage.getItem('queue')) || [];
  playing = JSON.parse(localStorage.getItem('playing')) || [];
  render();
}

function addPlayer(){
  const input = document.getElementById('playerName');
  const name = input.value.trim();
  if(!name) return;

  if(queue.includes(name) || playing.includes(name)){
    alert('Jugador ya existe');
    return;
  }

  queue.push(name);
  input.value='';
  save(); render();
}

function removePlayer(name){
  const mode = parseInt(document.getElementById('mode').value);

  queue = queue.filter(p=>p!==name);
  playing = playing.filter(p=>p!==name);

  while(playing.length < mode && queue.length > 0){
    playing.push(queue.shift());
  }

  save(); render();
}

// 🔥 CORREGIDO AQUÍ
function sendToQueue(name){
  const mode = parseInt(document.getElementById('mode').value);

  // quitar de jugando
  playing = playing.filter(p => p !== name);

  // 🔥 AHORA va al FINAL (no vuelve inmediatamente)
  queue.push(name);

  // rellenar automáticamente
  while(playing.length < mode && queue.length > 0){
    playing.push(queue.shift());
  }

  save();
  render();
}

function startGame(){
  const mode = parseInt(document.getElementById('mode').value);
  if(playing.length>0){ alert('Ya hay partida en curso'); return; }
  if(queue.length < mode){ alert('No hay suficientes jugadores'); return; }

  playing = queue.splice(0, mode);
  save(); render();
}

function finishGame(){
  if(playing.length===0) return;

  let winner = prompt('¿Quién ganó? Escribe el nombre EXACTO');
  if(!winner || !playing.includes(winner)){
    alert('Nombre inválido'); return;
  }

  let losers = playing.filter(p=>p!==winner);

  playing = [winner];

  let mode = parseInt(document.getElementById('mode').value);
  let needed = mode - 1;

  // perdedores vuelven primero
  queue.unshift(...losers);

  let nextPlayers = queue.splice(0, needed);
  playing.push(...nextPlayers);

  save(); render();
}

function render(){
  const playingList = document.getElementById('playingList');
  const queueList = document.getElementById('queueList');
  const nextList = document.getElementById('nextList');

  playingList.innerHTML='';
  queueList.innerHTML='';
  nextList.innerHTML='';

  playing.forEach(p=>{
    const li = document.createElement('li');

    const text = document.createTextNode(p + " ");
    const btn = document.createElement('button');

    btn.textContent = "Salir";
    btn.className = "danger";
    btn.onclick = () => sendToQueue(p);

    li.appendChild(text);
    li.appendChild(btn);

    playingList.appendChild(li);
  });

  queue.forEach((p,i)=>{
    const li = document.createElement('li');

    const text = document.createTextNode(p + " ");
    const btn = document.createElement('button');

    btn.textContent = "X";
    btn.className = "danger";
    btn.onclick = () => removePlayer(p);

    li.appendChild(text);
    li.appendChild(btn);

    queueList.appendChild(li);

    if(i<4){
      const n=document.createElement('li');
      n.textContent=p;
      nextList.appendChild(n);
    }
  });
}

load();
</script>

</body>
</html>
